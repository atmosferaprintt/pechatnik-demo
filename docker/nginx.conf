server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Supabase через тот же порт 80: некоторые провайдеры режут порт 8000.
    # 172.17.0.1 — докер-шлюз к хосту, где Kong опубликован на :8000.
    location ~ ^/(auth|rest|realtime|storage|functions)/ {
        proxy_pass http://172.17.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 25m;
    }

    # SPA: все пути отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш статики с хэшами в имени
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
